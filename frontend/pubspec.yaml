name: krutidev_ai_typing
description: AI Voice Typing Agent for Kruti Dev in Microsoft Word
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & WebSocket
  http: ^1.2.1
  web_socket_channel: ^2.4.0

  # Audio recording — v4.x stable interface, works Windows + Web + Android
  record: 4.4.4

  # Share & download
  share_plus: ^9.0.0

  # State management
  provider: ^6.1.2

  # File handling
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  open_filex: ^4.3.4

  # Storage
  shared_preferences: ^2.2.3

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.4.0
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
